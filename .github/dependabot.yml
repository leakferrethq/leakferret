version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch:
        applies-to: version-updates
        update-types: [patch]
      minor:
        applies-to: version-updates
        update-types: [minor]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
