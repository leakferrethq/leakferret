version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      patch:
        applies-to: version-updates
        update-types: [patch]
      minor:
        applies-to: version-updates
        update-types: [minor]
    ignore:
      # Major bumps are reviewed and applied by hand, not auto-PR'd.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
