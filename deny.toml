[advisories]
db-path  = "~/.cargo/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]
yanked   = "deny"
ignore = [
    # number_prefix (pulled in transitively by indicatif) is unmaintained
    # with no safe upgrade available upstream. Low-risk: it only formats
    # numeric prefixes for the progress bar. Revisit if indicatif migrates.
    "RUSTSEC-2025-0119",
]

[licenses]
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
